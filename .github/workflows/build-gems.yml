---
name: Build gems

on:
  workflow_dispatch:
  push:
    branches: ["main", "cross-gem/*", "pkg/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@1.4.3
        with:
          supported-ruby-platforms: |
            # Excluding:
            # `arm-linux`: Cranelift doesn't support 32-bit architectures
            # `x64-mingw32`: `x64-mingw-ucrt` should be used for Ruby 3.1+ (https://github.com/rake-compiler/rake-compiler-dock?tab=readme-ov-file#windows)
            # 3.0 is deprecated as stable ruby version according to:
            #  https://github.com/oxidize-rb/actions/blob/main/fetch-ci-data/evaluate.rb#L54
            exclude: [arm-linux, x64-mingw32]
          stable-ruby-versions: |
            exclude: [head]

  native-smoke:
    name: Smoke ${{ matrix.ruby-platform }} native gem on Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-platform: x64-mingw-ucrt
            os: windows-latest
            ruby: "4.0"
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - uses: actions/download-artifact@v8
        with:
          run-id: 26301529984
          name: cross-gem-${{ matrix.ruby-platform }}
          path: pkg/
          github-token: ${{ github.token }}

      - name: Smoke gem install
        shell: bash
        run: |
          gem install pkg/wasmtime-*.gem --verbose
          ruby -v
          ruby -e 'require "rbconfig"; p RUBY_PLATFORM; p RbConfig::CONFIG.values_at("arch", "host_cpu", "target_cpu", "host_os")'
          ruby -e 'spec = Gem::Specification.find_by_name("wasmtime"); puts spec.full_gem_path; puts Dir[File.join(spec.full_gem_path, "lib/wasmtime/*/wasmtime_rb.so")]'
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmd //c 'where ruby'
            cmd //c 'where x64-ucrt-ruby400.dll'
            cmd //c 'where bcrypt.dll'
            cmd //c 'where bcryptprimitives.dll'
            cmd //c 'where api-ms-win-crt-runtime-l1-1-0.dll'
            cmd //c 'where api-ms-win-crt-private-l1-1-0.dll'
            cmd //c 'where api-ms-win-core-synch-l1-2-0.dll'

            for dll_name in \
              api-ms-win-crt-runtime-l1-1-0.dll \
              api-ms-win-crt-private-l1-1-0.dll \
              api-ms-win-core-synch-l1-2-0.dll; do
              while IFS= read -r dll_path; do
                dll_path="${dll_path%$'\r'}"
                echo "==== $dll_path ===="
                objdump -f "$(cygpath -u "$dll_path")" || true
              done < <(cmd //c "where $dll_name" 2>/dev/null || true)
            done
          fi

          script="puts Wasmtime::Engine.new.precompile_module('(module)')"
          set +e
          ruby -rwasmtime -e "$script" | grep wasmtime.info
          status=$?
          set -e

          if [[ "$status" -ne 0 && "${{ runner.os }}" == "Windows" ]]; then
            echo "::warning::Initial require failed; retrying with a sanitized PATH"
            ruby_bindir="$(cygpath -u "$(ruby -e 'require "rbconfig"; print RbConfig::CONFIG.fetch("bindir")')")"
            devkit="$(cygpath -u "$RI_DEVKIT")"
            export PATH="$ruby_bindir:$devkit/ucrt64/bin:$devkit/usr/bin:/c/Windows/System32:/c/Windows"
            echo "Sanitized PATH=$PATH"
            cmd //c 'where ruby'
            cmd //c 'where x64-ucrt-ruby400.dll'
            cmd //c 'where api-ms-win-crt-runtime-l1-1-0.dll' || true
            cmd //c 'where api-ms-win-crt-private-l1-1-0.dll' || true
            cmd //c 'where api-ms-win-core-synch-l1-2-0.dll' || true
            ruby -rwasmtime -e "$script" | grep wasmtime.info
          else
            exit "$status"
          fi

          echo "✅ Successfully gem installed"

  source:
    if: false # Temporarily disabled while debugging x64-mingw-ucrt smoke failures.
    name: Build source gem
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        ruby: ["4.0"]
    steps:
      - uses: actions/checkout@v6

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cargo-cache: false
          cache-version: v2

      - name: Smoke test gem install
        shell: bash
        run: bundle exec rake pkg:ruby:test
