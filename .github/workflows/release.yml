---
name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
    steps:
      - uses: actions/checkout@v6

      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@1.4.3
        with:
          stable-ruby-versions: |
            exclude: [head]

      - id: build-matrix
        run: echo "build-matrix={\"include\":$(node .github/scripts/build-build-matrix.js)}" >> $GITHUB_OUTPUT

  build:
    name: Build native gem (${{ matrix.ruby-platform }})
    needs: ci-data
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.ci-data.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.apt-packages
        run: sudo apt-get update && sudo apt-get --assume-yes install ${{ matrix.apt-packages }}

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          cargo-cache: false
          cache-version: native-${{ matrix.ruby-platform }}-v1

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install llvm-mingw
        if: matrix.llvm-mingw
        shell: pwsh
        run: |
          $version = "20240619"
          $archive = "llvm-mingw-$version-ucrt-x86_64.zip"
          curl.exe -L -o $archive "https://github.com/mstorsjo/llvm-mingw/releases/download/$version/$archive"
          Expand-Archive $archive -DestinationPath $env:RUNNER_TEMP
          $root = Join-Path $env:RUNNER_TEMP "llvm-mingw-$version-ucrt-x86_64"
          "LLVM_MINGW_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LLVM_MINGW_BIN=$root\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure C compiler
        if: matrix.cc
        shell: bash
        run: |
          target_env=$(echo "${{ matrix.rust-target }}" | tr '[:lower:]-' '[:upper:]_')
          target_var=$(echo "${{ matrix.rust-target }}" | tr '[:upper:]-' '[:lower:]_')
          cc="${{ matrix.cc }}"
          cxx="${{ matrix.cxx }}"
          ar="${{ matrix.ar }}"
          if [ "${{ matrix.llvm-mingw }}" = "true" ]; then
            cc="${LLVM_MINGW_BIN}\\${cc}.exe"
            cxx="${LLVM_MINGW_BIN}\\${cxx}.exe"
            ar="${LLVM_MINGW_BIN}\\${ar}.exe"
          fi
          echo "CARGO_TARGET_${target_env}_LINKER=${cc}" >> "$GITHUB_ENV"
          echo "CC_${target_var}=${cc}" >> "$GITHUB_ENV"
          if [ -n "${cxx}" ]; then
            echo "CXX_${target_var}=${cxx}" >> "$GITHUB_ENV"
          fi
          if [ -n "${ar}" ]; then
            echo "AR_${target_var}=${ar}" >> "$GITHUB_ENV"
          fi

      - name: Build native gem
        run: bundle exec rake native:wasmtime:${{ matrix.ruby-platform }} gem
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}
          RB_SYS_CARGO_PROFILE: release
          RUSTFLAGS: ${{ matrix.rustflags }}
          RUBY_PLATFORM_TARGET: ${{ matrix.ruby-platform }}
          STABLE_RUBY_VERSIONS: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}

      - uses: actions/upload-artifact@v7
        with:
          name: native-gem-${{ matrix.ruby-platform }}
          path: pkg/*-${{ matrix.ruby-platform }}.gem
          if-no-files-found: error

      - name: Smoke gem install
        if: matrix.smoke-test
        shell: bash
        run: |
          gem install pkg/wasmtime-*.gem --verbose
          ruby -rwasmtime -e "Wasmtime::Engine.new.precompile_module('(module)')"
          echo "✅ Successfully gem installed"

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1

      - uses: actions/download-artifact@v8
        with:
          pattern: native-gem-*
          merge-multiple: true
          path: pkg/

      - name: Package source gem
        run: bundle exec rake pkg:ruby

      - name: Ensure version matches the tag
        run: |
          GEM_VERSION=$(grep VERSION lib/wasmtime/version.rb | head -n 1 | cut -d'"' -f2)
          if [ "v$GEM_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Gem version does not match tag"
            echo "  v$GEM_VERSION != ${{ github.ref_name }}"
            exit 1
          fi

      - name: Push Gem
        working-directory: pkg/
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_KEY }}
        run: |
          mkdir -p $HOME/.gem
          touch $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
          printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
          ls -l
          for i in *.gem; do
            if [ -f "$i" ]; then
              set +e
              gem push "$i" >push.out
              gemerr=$?
              set -e
              if [ "$gemerr" -ne 0 ]; then
                sed 's/^/::error:: /' push.out
                if ! grep -q "Repushing of gem" push.out; then
                  exit $gemerr
                fi
              fi
            fi
          done

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          generateReleaseNotes: true
          draft: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          skipIfReleaseExists: true
